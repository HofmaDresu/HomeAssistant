alias: Vacuum main floor
description: ""
triggers:
  - at: "11:00:00"
    trigger: time
conditions:
  - condition: and
    conditions:
      - condition: state
        entity_id: input_boolean.vacuum_circuitbreaker
        state: "off"
      - condition: state
        entity_id: input_boolean.vacation_mode
        state: "off"
actions:
  - if:
      - condition: time
        weekday:
          - sun
    then:
      - target:
          entity_id: vacuum.roborock_s7_maxv
        data:
          fan_speed: max
        action: vacuum.set_fan_speed
      - device_id: 76db24d3a176285f3be6d972ee76b37a
        domain: select
        entity_id: dfbe856fbf9eebc63d793e257ef12970
        type: select_option
        option: standard
      - target:
          entity_id: vacuum.roborock_s7_maxv
        data: {}
        action: vacuum.start
      - stop: ""
  - if:
      - condition: time
        weekday:
          - wed
    then:
      - target:
          entity_id: vacuum.roborock_s7_maxv
        data:
          fan_speed: quiet
        action: vacuum.set_fan_speed
      - device_id: 76db24d3a176285f3be6d972ee76b37a
        domain: select
        entity_id: dfbe856fbf9eebc63d793e257ef12970
        type: select_option
        option: mild
      - target:
          entity_id: vacuum.roborock_s7_maxv
        data: {}
        action: vacuum.start
      - stop: ""
  - if:
      - condition: or
        conditions:
          - condition: time
            weekday:
              - fri
          - condition: state
            entity_id: input_boolean.pet_mode
            state: "on"
    then:
      - target:
          entity_id: vacuum.roborock_s7_maxv
        data:
          fan_speed: quiet
        action: vacuum.set_fan_speed
      - device_id: 76db24d3a176285f3be6d972ee76b37a
        domain: select
        entity_id: dfbe856fbf9eebc63d793e257ef12970
        type: select_option
        option: "off"
      - target:
          entity_id: vacuum.roborock_s7_maxv
        data: {}
        action: vacuum.start
mode: single
