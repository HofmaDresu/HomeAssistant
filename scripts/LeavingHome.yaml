alias: Leaving Home
sequence:
  - action: script.play_alpha_centauri_sound_on_livingroom
    metadata: {}
    data:
      soundfile: media-source://media_source/local/CPU please don't go.wav
  - type: turn_on
    device_id: c15ccc57da14176ae9d3a7af23376ce1
    entity_id: 1005ff4ba31f145fb2f6f60926ab8924
    domain: switch
  - metadata: {}
    data: {}
    target:
      device_id:
        - 26b86cb27513279a9260f6ab9e46ffac
    action: camera.disable_motion_detection
  - alias: Turn on garage light if needed
    if:
      - condition: and
        conditions:
          - condition: sun
            before: sunrise
            after: sunset
    then:
      - type: turn_on
        device_id: 0f1815f6576728547da6fbc3a3b69277
        entity_id: d7144b619bd94371cb9c1e6459036229
        domain: switch
  - delay:
      hours: 0
      minutes: 0
      seconds: 6
      milliseconds: 0
    enabled: false
  - alias: arm alarm if needed and petmode off
    if:
      - condition: and
        conditions:
          - condition: device
            device_id: 12991409e93a14125e39db65a3b740dc
            domain: alarm_control_panel
            entity_id: ed8fc83278462fc5ba4f6de76da799ad
            type: is_disarmed
          - condition: state
            entity_id: input_boolean.pet_mode
            state: "off"
    then:
      - device_id: 12991409e93a14125e39db65a3b740dc
        domain: alarm_control_panel
        entity_id: ed8fc83278462fc5ba4f6de76da799ad
        type: arm_away
        code: "{{!secret alarm_code}}"
  - delay:
      hours: 0
      minutes: 1
      seconds: 0
      milliseconds: 0
  - alias: Turn off indoor lights if not pet mode
    if:
      - condition: state
        entity_id: input_boolean.pet_mode
        state: "off"
    then:
      - target:
          entity_id: scene.indoor_power_off
        metadata: {}
        action: scene.turn_on
        data: {}
    else:
      - action: scene.turn_on
        metadata: {}
        data: {}
        target:
          entity_id: scene.pet_lighting
  - target:
      entity_id: cover.all_shades
    data: {}
    action: cover.close_cover
  - action: script.turn_on
    metadata: {}
    data: {}
    target:
      entity_id: script.lock_doors
  - alias: Wait until I leave or 5 min pass
    wait_for_trigger:
      - entity_id: person.hofmadresu
        zone: zone.home
        event: leave
        trigger: zone
    timeout:
      hours: 0
      minutes: 5
      seconds: 0
      milliseconds: 0
  - type: turn_off
    device_id: 0f1815f6576728547da6fbc3a3b69277
    entity_id: d7144b619bd94371cb9c1e6459036229
    domain: switch
  - metadata: {}
    data: {}
    target:
      device_id:
        - 26b86cb27513279a9260f6ab9e46ffac
    action: camera.enable_motion_detection
  - type: turn_off
    device_id: c15ccc57da14176ae9d3a7af23376ce1
    entity_id: 1005ff4ba31f145fb2f6f60926ab8924
    domain: switch
  - alias: arm alarm if needed and petmode on
    if:
      - condition: and
        conditions:
          - condition: device
            device_id: 12991409e93a14125e39db65a3b740dc
            domain: alarm_control_panel
            entity_id: ed8fc83278462fc5ba4f6de76da799ad
            type: is_disarmed
          - condition: state
            entity_id: input_boolean.pet_mode
            state: "on"
    then:
      - device_id: 12991409e93a14125e39db65a3b740dc
        domain: alarm_control_panel
        entity_id: ed8fc83278462fc5ba4f6de76da799ad
        type: arm_home
        code: "{{!secret alarm_code}}"
  - action: switch.turn_on
    metadata: {}
    data: {}
    target:
      entity_id: switch.circadian_lighting_whole_house_circadian_switch
mode: single
