alias: Morning Report
mode: restart
sequence:
  - action: todo.get_items
    metadata: {}
    data:
      status: needs_action
    response_variable: chore_list
    target:
      entity_id: todo.chores
  - action: weather.get_forecasts
    metadata: {}
    data:
      type: daily
    target:
      device_id: 9bdacd0d05f68f09cc87f284a7e4811c
    response_variable: weather
  - action: calendar.get_events
    metadata: {}
    data:
      duration:
        hours: 24
        minutes: 0
        seconds: 0
      start_date_time: "{{ today_at().strftime('%Y-%m-%d %H:%M') }}"
    target:
      entity_id: calendar.hofma_dresu
    response_variable: events
  - variables:
      message: >
        Good {%- if now().hour < 12 %}morning{% elif now().hour < 16
        %}afternoon{% elif now().hour < 20 %}evening{% else %}night{%- endif %}
        Matt!


        Today is going to be a {%- if
        weather['weather.openweathermap'].forecast[0].temperature < 20 %} cold{%
        elif weather['weather.openweathermap'].forecast[0].temperature < 50 %}
        chilly{% elif weather['weather.openweathermap'].forecast[0].temperature
        < 80 %} balmy{% else %} hot{%- endif %} and
        {{weather['weather.openweathermap'].forecast[0].condition}} day with a
        high of {{weather['weather.openweathermap'].forecast[0].temperature}}
        and a low of {{weather['weather.openweathermap'].forecast[0].templow}}.


        {%- if

        weather['weather.openweathermap'].forecast[0].precipitation_probability

        > 0 %}
          There's a {{weather['weather.openweathermap'].forecast[0].precipitation_probability}} percent chance of precipitation today with an expected total of {{weather['weather.openweathermap'].forecast[0].precipitation}} inches
        {%- endif %}

        {% set calendarEvents = events['calendar.hofma_dresu'].events %} {% if
        calendarEvents | count > 0 %}
          On the docket today you have {% for ev in events['calendar.hofma_dresu'].events -%}{{ev.summary}} {%- if 'T' in ev.start %} at {{':'.join(ev.start.split('T')[1].split('-')[0].split(':', 2)[:2])}}{% endif -%}{{", "}}{%- endfor %}
        {% else %}
          There's nothing on your calendar today, enjoy the free time!
        {%- endif %}

            {% set chorelist_items = chore_list['todo.chores']['items'] | list %} 

        {% set should_show_chores = chorelist_items | count > 0 %}

        {% set today_is_mow_day = states.binary_sensor.today_is_mow_day.state ==
        'on' %}

        {% set company_mode = states.input_boolean.company_mode.state == 'on' %}
        {%- if not company_mode %}
          {%- if now().weekday() == 1 or should_show_chores or today_is_mow_day %}
            You have the following chores needing doing:
            {%- if now().weekday() == 1 %}
              {%- if states.input_boolean.recycling_at_next_trash.state == "on" %}
                Take out trash, recycling, and yard waste,
              {% else %}
                Take out trash,
              {% endif -%}
            {% endif -%}
            {%- if today_is_mow_day %}
              Pick up sticks in lawn,
            {% endif -%}
            {%- if should_show_chores %}
              {% for chore in chorelist_items -%}
                {{chore.summary}}{{', '}}
              {%- endfor %}
            {% endif -%}
          {% endif -%}
        {% endif -%}

        Have a great day!
  - stop: testing
    enabled: false
  - action: tts.speak
    metadata: {}
    data:
      cache: true
      media_player_entity_id: media_player.home_assistant_voice_091b0c_media_player
      message: "{{ message }}"
    target:
      entity_id: tts.home_assistant_cloud
    enabled: true
description: ""
icon: mdi:radio-tower
